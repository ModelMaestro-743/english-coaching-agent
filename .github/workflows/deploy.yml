name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deployment confirmation
        run: |
          echo "✅ CI passed — Render will auto-deploy from the main branch."
          echo "Monitor your deployment at: https://dashboard.render.com"
